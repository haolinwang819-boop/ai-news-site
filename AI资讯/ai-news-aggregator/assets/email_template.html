<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI日报 - {{DATE}}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f0f2f5;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%;">
                    
                    <!-- Header Card -->
                    <tr>
                        <td style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px 16px 0 0; padding: 40px 30px; text-align: center;">
                            <h1 style="margin: 0; color: white; font-size: 32px; font-weight: 700;">📬 AI日报</h1>
                            <p style="margin: 15px 0 0 0; color: rgba(255,255,255,0.9); font-size: 16px;">{{DATE}}</p>
                            <div style="margin-top: 20px; display: inline-block; background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 20px;">
                                <span style="color: white; font-size: 14px;">📊 今日共 <strong>{{TOTAL_COUNT}}</strong> 条资讯</span>
                            </div>
                        </td>
                    </tr>
                    
                    <!-- Main Content Area -->
                    <tr>
                        <td style="background: #ffffff; padding: 30px; border-radius: 0 0 16px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
                            
                            {{IMAGE_VIDEO_SECTION}}
                            
                            {{LLM_SECTION}}
                            
                            {{STARTUP_SECTION}}
                            
                            {{HOT_NEWS_SECTION}}
                            
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style="text-align: center; padding: 30px 20px;">
                            <p style="margin: 0; color: #999; font-size: 13px;">
                                由 <strong>AI资讯聚合器</strong> 自动生成
                            </p>
                            <p style="margin: 10px 0 0 0; color: #bbb; font-size: 12px;">
                                数据来源：OpenAI · Anthropic · Google AI · 机器之心 · 量子位 等
                            </p>
                        </td>
                    </tr>
                    
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
